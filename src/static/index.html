<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forecast-Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #212121;
      --surface:   #2f2f2f;
      --border:    #3f3f3f;
      --text:      #ececec;
      --muted:     #8e8ea0;
      --accent:    #ffffff;
      --user-bg:   #2f2f2f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
    }

    /* ── Layout ── */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Thin title bar */
    header {
      width: 100%;
      padding: 14px 0;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.02em;
    }
    header span { color: var(--text); font-weight: 600; }

    /* Main chat area */
    #chat-wrap {
      width: 100%;
      max-width: 680px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0 16px;
    }

    /* Messages scroll area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Message rows ── */
    .row { display: flex; gap: 12px; padding: 6px 0; animation: appear .2s ease; }
    .row.user { flex-direction: row-reverse; }
    @keyframes appear { from { opacity:0; transform:translateY(4px); } to { opacity:1; } }

    /* Avatar circle */
    .av {
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 13px;
      margin-top: 2px;
    }
    .row.user .av { background: #ffffff18; color: var(--text); }
    .row.bot  .av { background: #ffffff14; color: var(--text); }

    /* Content area */
    .content { flex: 1; min-width: 0; }

    /* User message: small pill */
    .row.user .content {
      display: flex;
      justify-content: flex-end;
    }
    .user-bubble {
      background: var(--user-bg);
      padding: 10px 16px;
      border-radius: 18px;
      max-width: 88%;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Bot message: plain text, no bubble */
    .bot-text {
      padding: 4px 0;
      line-height: 1.7;
      color: var(--text);
      max-width: 100%;
    }

    /* Markdown tweaks */
    .bot-text h3          { font-size: 1rem; font-weight: 700; margin: 12px 0 4px; color: var(--text); }
    .bot-text p           { margin: 4px 0; }
    .bot-text strong      { color: #fff; font-weight: 600; }
    .bot-text em          { color: var(--muted); }
    .bot-text code        { background: #1a1a1a; padding: 2px 6px; border-radius: 5px; font-size: 0.83rem; font-family: "SF Mono", Consolas, monospace; }
    .bot-text ul, .bot-text ol { padding-left: 20px; margin: 4px 0; }
    .bot-text li          { margin: 3px 0; }

    /* ── Typing dots ── */
    .typing-dots { display: flex; gap: 5px; padding: 12px 0 8px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.4s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }

    /* ── Suggestion chips (shown only when chat is empty) ── */
    #suggestions {
      padding: 0 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    #suggestions h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .chip {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.83rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
      text-align: left;
      background: transparent;
    }
    .chip:hover { border-color: #666; color: var(--text); background: #ffffff08; }

    /* ── Input area ── */
    #input-area {
      padding: 12px 0 20px;
      width: 100%;
    }
    #input-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 18px;
      transition: border-color .2s;
    }
    #input-box:focus-within { border-color: #666; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }
    #send-btn:hover   { opacity: .85; }
    #send-btn:active  { transform: scale(.94); }
    #send-btn:disabled { opacity: .25; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

<header><span>Forecast</span> · XGBoost</header>

<div id="chat-wrap">

  <div id="messages">
    <!-- messages injected here -->
  </div>

  <!-- Empty-state suggestions -->
  <div id="suggestions">
    <h2>What can I forecast for you?</h2>
    <div class="chips-row">
      <button class="chip" onclick="useChip(this)">Sales forecast for next Monday</button>
      <button class="chip" onclick="useChip(this)">What if we're out of stock today?</button>
    </div>
  </div>

  <div id="input-area">
    <div id="input-box">
      <textarea id="user-input" rows="1" placeholder="Ask a forecast question…"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const suggestionsEl = document.getElementById('suggestions');

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // Enter sends (Shift+Enter = newline)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function useChip(el) {
    inputEl.value = el.textContent.trim();
    inputEl.dispatchEvent(new Event('input'));
    sendMessage();
  }

  function hideSuggestions() {
    if (suggestionsEl.style.display !== 'none') suggestionsEl.style.display = 'none';
  }

  function addUserMessage(text) {
    hideSuggestions();
    const row = document.createElement('div');
    row.className = 'row user';
    row.innerHTML = `
      <div class="av">U</div>
      <div class="content"><div class="user-bubble">${escapeHtml(text)}</div></div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function addBotMessage(markdown) {
    hideSuggestions();
    const row = document.createElement('div');
    row.className = 'row bot';
    row.innerHTML = `
      <div class="av">✦</div>
      <div class="content"><div class="bot-text">${marked.parse(markdown)}</div></div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'row bot';
    row.id = 'typing';
    row.innerHTML = `
      <div class="av">✦</div>
      <div class="content">
        <div class="typing-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addUserMessage(text);
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      hideTyping();
      addBotMessage(res.ok ? data.reply : `⚠️ ${data.detail || 'Something went wrong.'}`);
    } catch (err) {
      hideTyping();
      addBotMessage(`⚠️ Could not reach the server.`);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
